<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>COMMITS // ECHO://OS | John Ogletree</title>
    <meta name="description" content="System commit logs and version history for John Ogletree's digital environment.">
    <link rel="icon" type="image/jpeg" href="/logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/effects.css">
    <link rel="stylesheet" href="/css/hero.css">
    <style>
        .commit-container {
            display: flex;
            flex-direction: column;
            height: 75vh;
            border: 1px solid var(--neon-primary);
            background: #0d1117;
            position: relative;
            overflow: hidden;
        }

        .commit-toolbar {
            padding: 10px 20px;
            background: rgba(0, 255, 157, 0.1);
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .view-toggle {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 157, 0.2);
            padding: 2px;
            border-radius: 4px;
        }

        .toggle-btn {
            padding: 5px 15px;
            font-size: 0.65rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            background: transparent;
            font-family: 'Share Tech Mono', monospace;
        }

        .toggle-btn.active {
            color: #000;
            background: var(--neon-primary);
        }

        .commit-viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #rawView {
            height: 100%;
            overflow-y: auto;
            padding: 30px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: #d1d1d1;
            white-space: pre-wrap;
            background: #05070a;
        }

        #guiView {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: #fff; /* GitHub default */
        }

        .log-header {
            color: var(--neon-primary);
            border-bottom: 1px solid rgba(0, 255, 157, 0.2);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body style="margin:0; padding:0;">
    <div class="fixed-banner-container">
        <script src="https://keepandroidopen.org/banner.js?size=minimal&animation=off"></script>
    </div>

    <site-sidebar active="log"></site-sidebar>

    <div class="crt"></div><div class="scanner"></div>
    
    <div class="main-content">
        <section class="hero" style="min-height: 25vh; margin-bottom: 20px;">
            <div class="hero-grid"></div>
            <div class="hero-content">
                <div class="hero-hud">
                    <div class="hud-bracket bracket-tl"></div>
                    <div class="hud-bracket bracket-tr"></div>
                    <div class="hud-bracket bracket-bl"></div>
                    <div class="hud-bracket bracket-br"></div>
                    
                    <h1 class="hero-title glitch" data-text="VERSION_CONTROL">VERSION_CONTROL</h1>
                    <div class="text-neon" style="letter-spacing: 5px; font-weight: bold; margin: 10px 0;">
                        COMMIT_LOGS // REPOSITORY_STREAM
                    </div>
                </div>
            </div>
        </section>

        <div class="container" id="app">
            <div class="commit-container">
                <div class="commit-toolbar">
                    <div style="font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--neon-primary);">
                        <i class="fas fa-clock-rotate-left"></i> SYSTEM_JOURNAL
                    </div>
                    <div class="view-toggle">
                        <button class="toggle-btn active" id="btnRaw">Local Archive</button>
                        <button class="toggle-btn" id="btnGui">Remote Node</button>
                    </div>
                </div>
                
                <div class="commit-viewport">
                    <div id="rawView">
                        <div class="log-header">LOADING SYSTEM ARCHIVE...</div>
                        <div id="logContent"></div>
                    </div>
                    <iframe id="guiView" src="https://github.com/jvhn0gl3/Echo-site/commits/master"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/sidebar-component.js"></script>
    <script src="/js/navigation.js"></script>
    <script src="/js/ui-effects.js"></script>
    <script src="/js/forms.js"></script>
    <script src="/js/data-loader.js"></script>
    <script src="/js/content-loader.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const btnRaw = document.getElementById('btnRaw');
            const btnGui = document.getElementById('btnGui');
            const rawView = document.getElementById('rawView');
            const guiView = document.getElementById('guiView');
            const logContent = document.getElementById('logContent');
            const logHeader = document.querySelector('.log-header');

            // Load COMMIT_LOG.md
            try {
                const response = await fetch('/COMMIT_LOG.md');
                const text = await response.text();
                logContent.textContent = text;
                logHeader.textContent = "ECHO://SYS/ARCHIVE/COMMIT_LOG.md";
            } catch (error) {
                logContent.textContent = "[ERROR] Failed to synchronize with local archive.";
            }

            btnRaw.addEventListener('click', () => {
                btnRaw.classList.add('active');
                btnGui.classList.remove('active');
                rawView.style.display = 'block';
                guiView.style.display = 'none';
            });

            btnGui.addEventListener('click', () => {
                btnGui.classList.add('active');
                btnRaw.classList.remove('active');
                rawView.style.display = 'none';
                guiView.style.display = 'block';
            });
        });
    </script>
</body>
</html>
