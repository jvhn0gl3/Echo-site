<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>COMMITS // ECHO://OS | John Ogletree</title>
    <meta name="description" content="System commit logs and version history for John Ogletree's digital environment.">
    <link rel="icon" type="image/jpeg" href="/logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <!-- Pre-Render Style Injection Engine -->
    <script>
        (function() {
            const width = window.innerWidth;
            let breakpoint = 'mobile';
            if (width >= 1024) breakpoint = 'desktop';
            else if (width >= 768) breakpoint = 'tablet';
            
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = `/css/layout-${breakpoint}.css`;
            document.head.appendChild(link);
            
            console.log(`[SYSTEM] Resolution-Aware Style Injected: ${breakpoint}_mode`);
        })();
    </script>
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/effects.css">
    <link rel="stylesheet" href="/css/hero.css">
    <style>
        .commit-container {
            display: flex;
            flex-direction: column;
            height: 75vh;
            border: 1px solid var(--neon-primary);
            background: #0d1117;
            position: relative;
            overflow: hidden;
        }

        .commit-toolbar {
            padding: 10px 20px;
            background: rgba(0, 255, 157, 0.1);
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .view-toggle {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 157, 0.2);
            padding: 2px;
            border-radius: 4px;
        }

        .toggle-btn {
            padding: 5px 15px;
            font-size: 0.65rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            background: transparent;
            font-family: 'Share Tech Mono', monospace;
        }

        .toggle-btn.active {
            color: #000;
            background: var(--neon-primary);
        }

        .commit-viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #rawView, #guiView {
            height: 100%;
            overflow-y: auto;
            padding: 15px;
            background: #05070a;
        }

        #rawView {
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem; /* Sized down */
            color: #d1d1d1;
            white-space: pre-wrap;
        }

        #guiView {
            display: none;
            padding: 0;
        }

        .log-header {
            color: var(--neon-primary);
            border-bottom: 1px solid rgba(0, 255, 157, 0.2);
            padding-bottom: 8px;
            margin-bottom: 15px;
            font-size: 1rem;
            font-family: 'Share Tech Mono', monospace;
        }

        /* GUI Commit Styles */
        .commit-list {
            list-style: none;
            padding: 0;
            margin: 0;
            position: relative;
        }
        .commit-list::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 25px; /* Centered with 20px node + 15px padding */
            width: 2px;
            background: rgba(0, 255, 157, 0.1);
            z-index: 1;
        }
        .commit-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: background 0.2s;
            position: relative;
            z-index: 2;
        }
        .commit-graph-node {
            width: 22px;
            height: 22px;
            background: #05070a;
            border: 1px solid var(--neon-primary);
            border-radius: 50%;
            margin-top: 5px;
            flex-shrink: 0;
            position: relative;
            z-index: 3;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.4);
            background-size: cover;
            background-position: center;
        }
        .commit-item:hover {
            background: rgba(0, 255, 157, 0.03);
        }
        .commit-main {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }
        .commit-msg {
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .commit-msg:hover {
            color: var(--neon-primary);
        }
        .commit-meta {
            font-size: 0.7rem;
            color: var(--text-dim);
            display: flex;
            gap: 15px;
        }
        .commit-author { color: var(--neon-primary); }
        .commit-hash {
            font-family: 'Fira Code', monospace;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 3px;
            color: var(--text-muted);
            text-decoration: none;
        }
        .commit-hash:hover {
            background: var(--neon-primary);
            color: #000;
        }
        .commit-date {
            font-style: italic;
        }

        .commit-stats {
            font-size: 0.65rem;
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
            font-family: 'Fira Code', monospace;
        }
        .stat-add { color: var(--neon-primary); }
        .stat-del { color: #ff6b6b; }

        .loading-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--neon-primary);
            font-family: 'Share Tech Mono', monospace;
            gap: 15px;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(0, 255, 157, 0.1);
            border-top-color: var(--neon-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body style="margin:0; padding:0;">

    <site-sidebar active="log"></site-sidebar>

    <div class="crt"></div><div class="scanner"></div>
    
    <div class="main-content">
        <section class="hero" style="min-height: 25vh; margin-bottom: 20px;">
            <div class="hero-grid"></div>
            <div class="hero-content">
                <div class="hero-hud">
                    <div class="hud-bracket bracket-tl"></div>
                    <div class="hud-bracket bracket-tr"></div>
                    <div class="hud-bracket bracket-bl"></div>
                    <div class="hud-bracket bracket-br"></div>
                    
                    <h1 class="hero-title glitch" data-text="VERSION_CONTROL">VERSION_CONTROL</h1>
                    <div class="text-neon" style="letter-spacing: 5px; font-weight: bold; margin: 10px 0;">
                        COMMIT_LOGS // REPOSITORY_STREAM
                    </div>
                </div>
            </div>
        </section>

        <div class="container" id="app">
            <div class="commit-container">
                <div class="commit-toolbar">
                    <div style="font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--neon-primary);">
                        <i class="fas fa-clock-rotate-left"></i> SYSTEM_JOURNAL
                    </div>
                    <div class="view-toggle">
                        <button class="toggle-btn active" id="btnRaw">Local Archive</button>
                        <button class="toggle-btn" id="btnGui">Remote Stream</button>
                    </div>
                </div>
                
                <div class="commit-viewport">
                    <div id="rawView">
                        <div class="log-header">ECHO://SYS/ARCHIVE/COMMIT_LOG.md</div>
                        <div id="logContent">SYNCHRONIZING...</div>
                    </div>
                    <div id="guiView">
                        <div class="loading-overlay">
                            <div class="spinner"></div>
                            <span>POLLING REMOTE NODE...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/sidebar-component.js"></script>
    <script src="/js/navigation.js"></script>
    <script src="/js/ui-effects.js"></script>
    <script src="/js/forms.js"></script>
    <script src="/js/data-loader.js"></script>
    <script src="/js/content-loader.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const btnRaw = document.getElementById('btnRaw');
            const btnGui = document.getElementById('btnGui');
            const rawView = document.getElementById('rawView');
            const guiView = document.getElementById('guiView');
            const logContent = document.getElementById('logContent');

            let remoteLoaded = false;

            // Load COMMIT_LOG.md
            async function loadLocalArchive() {
                try {
                    const response = await fetch('/COMMIT_LOG.md');
                    const text = await response.text();
                    logContent.textContent = text;
                } catch (error) {
                    logContent.textContent = "[ERROR] Failed to synchronize with local archive.";
                }
            }

            // Fetch GitHub Commits with detailed stats
            async function fetchRemoteStream() {
                if (remoteLoaded) return;
                try {
                    const response = await fetch('https://api.github.com/repos/jvhn0gl3/Echo-site/commits');
                    const commits = await response.json();
                    
                    // Render list immediately
                    renderCommits(commits);
                    remoteLoaded = true;

                    // Fetch details for the latest 15 to get additions/deletions
                    const detailPromises = commits.slice(0, 15).map(c => 
                        fetch(`https://api.github.com/repos/jvhn0gl3/Echo-site/commits/${c.sha}`)
                            .then(res => res.json())
                    );

                    const details = await Promise.all(detailPromises);
                    updateWithStats(details);

                } catch (error) {
                    guiView.innerHTML = `<div class="loading-overlay" style="color: #ff6b6b;">[ERROR] Connection to Remote Node failed.</div>`;
                }
            }

            function renderCommits(commits) {
                let html = `
                    <div class="log-header" style="padding: 30px 30px 10px 30px; margin: 0;">ECHO://REMOTE/GITHUB/COMMIT_STREAM</div>
                    <div class="commit-list">
                `;
                
                commits.forEach(c => {
                    const date = new Date(c.commit.author.date).toLocaleDateString();
                    const msg = c.commit.message.split('\n')[0];
                    const hash = c.sha.substring(0, 7);
                    const url = c.html_url;
                    const profileUrl = "https://github.com/jvhn0gl3";
                    const avatar = "https://avatars.githubusercontent.com/u/223201019?v=4";
                    
                    html += `
                        <div class="commit-item">
                            <a href="${profileUrl}" target="_blank" class="commit-graph-node" style="background-image: url('${avatar}')"></a>
                            <div class="commit-main">
                                <div class="commit-stats" id="stats-${c.sha}">
                                    <!-- Populated by detail fetch -->
                                </div>
                                <a href="${url}" target="_blank" class="commit-msg">${msg}</a>
                                <div class="commit-meta">
                                    <span class="commit-author">@${c.author ? c.author.login : c.commit.author.name}</span>
                                    <span class="commit-date">${date}</span>
                                </div>
                            </div>
                            <a href="${url}" target="_blank" class="commit-hash">${hash}</a>
                        </div>
                    `;
                });
                
                html += `</div>`;
                guiView.innerHTML = html;
            }

            function updateWithStats(details) {
                details.forEach(d => {
                    const statsEl = document.getElementById(`stats-${d.sha}`);
                    if (statsEl) {
                        statsEl.innerHTML = `
                            <span class="stat-add">+${d.stats.additions}</span>
                            <span class="stat-del">-${d.stats.deletions}</span>
                        `;
                    }
                });
            }

            loadLocalArchive();

            btnRaw.addEventListener('click', () => {
                btnRaw.classList.add('active');
                btnGui.classList.remove('active');
                rawView.style.display = 'block';
                guiView.style.display = 'none';
            });

            btnGui.addEventListener('click', () => {
                btnGui.classList.add('active');
                btnRaw.classList.remove('active');
                rawView.style.display = 'none';
                guiView.style.display = 'block';
                fetchRemoteStream();
            });
        });
    </script>
</body>
</html>
