<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CONNECT // ECHO://TERMINAL | John Ogletree</title>
    <meta name="description" content="Contact and social network nodes for John Ogletree">
    <link rel="icon" type="image/jpeg" href="/logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/effects.css">
    <link rel="stylesheet" href="/css/hero.css">
    <link rel="stylesheet" href="/css/footer.css">
</head>
<body style="margin:0; padding:0;">
    <div class="fixed-banner-container">
        <script src="https://keepandroidopen.org/banner.js?size=minimal&animation=off"></script>
    </div>

    <site-sidebar active="connect"></site-sidebar>

    <div class="crt"></div><div class="scanner"></div>
    
    <div class="main-content">
        <section class="hero" style="min-height: 40vh; margin-bottom: 30px;">
            <div class="hero-grid"></div>
            <div class="hero-content">
                <div class="hero-hud">
                    <div class="hud-bracket bracket-tl"></div>
                    <div class="hud-bracket bracket-tr"></div>
                    <div class="hud-bracket bracket-bl"></div>
                    <div class="hud-bracket bracket-br"></div>
                    
                    <h1 class="hero-title glitch" data-text="DEV:CONNECT">DEV:CONNECT</h1>
                    <div class="text-neon" style="letter-spacing: 5px; font-weight: bold; margin: 10px 0;">
                        NETWORK NODES // DATA TRANSMISSION
                    </div>
                </div>
            </div>
        </section>

        <div class="container" id="app">
            <section id="connect-interfaces">
                <h2><i class="fas fa-plug"></i> [DEV] transmission_protocols — operational</h2>
                
                <div class="grid-2">
                    <div class="terminal-card">
                        <div class="card-header"><i class="fas fa-envelope"></i><span class="card-title">Send Message</span></div>
                        <form id="contactForm">
                            <input type="text" placeholder="[name]" class="terminal-input" required>
                            <input type="email" placeholder="[email]" class="terminal-input" required>
                            <textarea rows="6" placeholder="[message_payload]" class="terminal-input" required></textarea>
                            <button type="submit" class="terminal-btn btn-send">$ send_transmission</button>
                        </form>
                    </div>
                    <div class="terminal-card">
                        <div class="card-header"><i class="fas fa-network-wired"></i><span class="card-title">Social Grid</span></div>
                        <p style="margin-bottom: 20px;">Establishing direct peer-to-peer connections across the digital network.</p>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <a href="https://github.com/jvhn0gl3" target="_blank" class="terminal-btn btn-github"><i class="fab fa-github"></i> GitHub</a>
                            <a href="https://linkedin.com" target="_blank" class="terminal-btn btn-linkedin"><i class="fab fa-linkedin"></i> LinkedIn</a>
                            <a href="https://twitter.com" target="_blank" class="terminal-btn btn-twitter"><i class="fab fa-x-twitter"></i> X / Twitter</a>
                            <a href="mailto:contact@john-ogletree.me" class="terminal-btn btn-email"><i class="fas fa-envelope"></i> Email</a>
                        </div>
                        <div style="margin-top: 30px; text-align: center; border: 1px dashed var(--neon-primary); padding: 20px;">
                            <span class="pulse-dot"></span> <span class="text-neon" style="font-weight: bold;">CREATIVE MODE ACTIVE</span>
                            <p style="font-size: 0.7rem; color: var(--text-dim); margin-top: 10px;">SYSTEM IS READY FOR EXTERNAL SIGNAL ACQUISITION.</p>
                        </div>
                    </div>
                </div>

            </section>
        </div>

        <site-footer></site-footer>
    </div>

    <script src="/js/sidebar-component.js"></script>
    <script src="/js/footer-component.js"></script>
    <script src="/js/navigation.js"></script>
    <script src="/js/ui-effects.js"></script>
    <script src="/js/forms.js"></script>
    <script src="/js/data-loader.js"></script>
    <script src="/js/content-loader.js"></script>
</body>
</html>
