<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App</title>
    <!-- Font Awesome CDN - Switched to official Font Awesome CDN -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.2/css/all.css" />
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            margin: 0;
            padding: 0;
            background-color: #e0e0e0; /* App background */
            color: #333;
            display: flex;
            flex-direction: row;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .sidebar {
            width: 60px; /* ALWAYS fixed width for icon-only sidebar */
            background-color: #ffffff; /* White sidebar */
            box-shadow: 2px 0 4px rgba(0,0,0,0.1); /* Shadow on the right side */
            display: flex;
            flex-direction: column;
            align-items: center; /* Center items horizontally */
            padding: 15px 0; /* Adjusted padding for icon-only */
            flex-shrink: 0; /* Prevent sidebar from shrinking */
            overflow: hidden; /* Hide any overflowing content */
        }
        .sidebar-header {
            display: flex;
            flex-direction: column; /* Stack icon and title if shown */
            align-items: center; /* Center items */
            padding: 0 10px; /* Reduced padding */
            margin-bottom: 15px; /* Reduced margin */
        }
        .app-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            margin-right: 0; /* Remove right margin */
            margin-bottom: 5px; /* Add bottom margin for spacing */
            object-fit: cover;
        }
        .app-title {
            color: #000000;
            font-size: 1em; /* Smaller font */
            font-weight: 600;
            margin: 0;
            display: none; /* HIDE the title permanently */
        }
        .sidebar-nav {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; /* Center nav links */
        }
        .sidebar-nav a {
            padding: 15px 0; /* Full padding on vertical axis, 0 horizontal */
            text-decoration: none;
            color: #333;
            font-size: 1em;
            display: flex; /* Use flex to center content if needed */
            justify-content: center; /* Center icon horizontally */
            align-items: center; /* Center icon vertically */
            width: 100%; /* Take full width of sidebar */
            transition: background-color 0.2s ease;
        }
        .sidebar-nav a:hover {
            background-color: #f0f0f0; /* Hover effect */
        }
        .sidebar-nav a.active {
            background-color: #e0e0e0;
            font-weight: bold;
        }
        /* Font Awesome icons styling within sidebar links */
        .sidebar-nav a i { /* Target Font Awesome icons */
            font-size: 1.5em; /* Make icons a bit larger */
            color: #555; /* Dark grey for icons */
            display: inline-block; /* Ensure it behaves like an element that can have size/display properties */
            text-align: center; /* Center the icon if it doesn't fill its space */
            font-family: "Font Awesome 6 Free"; /* Explicitly set font family */
            font-weight: 900; /* Common for solid icons */
        }
        .sidebar-nav a i:hover {
            color: #000; /* Darker on hover */
        }
        /* Hide any text that might be within links if not using <i> tags directly */
        .sidebar-nav a span {
            display: none;
        }

        .main-content {
            flex-grow: 1; /* Allow content to take up remaining space */
            padding: 15px; /* Consistent padding for smaller screens */
            box-sizing: border-box;
            overflow-y: auto; /* Enable scrolling if content overflows */
        }
        .main-content p {
            font-size: 1.1em;
            line-height: 1.6;
            margin-top: 0;
        }
        /* Responsive adjustments for smaller screens */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px; /* Sidebar is already 60px wide */
            }
            .main-content {
                padding: 15px; /* Ensure consistent padding */
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="logo.png" alt="App Logo" class="app-icon">
            <!-- Title is hidden by CSS -->
            <h1 class="app-title">My App</h1>
        </div>
        <nav class="sidebar-nav">
            <!-- Navigation links with Font Awesome icons -->
            <a href="#" class="active" aria-label="Dashboard">
                <i class="fas fa-tachometer-alt"></i>
            </a>
            <a href="#" aria-label="Settings">
                <i class="fas fa-cog"></i>
            </a>
            <a href="#" aria-label="Profile">
                <i class="fas fa-user"></i>
            </a>
            <a href="#" aria-label="About">
                <i class="fas fa-info-circle"></i>
            </a>
        </nav>
    </div>
    <div class="main-content">
        <p>Welcome to your personalized mobile application dashboard.</p>
        <p>Navigate using the sidebar on the left.</p>
    </div>
</body>
</html>
