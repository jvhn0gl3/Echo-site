<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ECHO://OS | John Ogletree</title>
    <meta name="description" content="John Ogletree - Digital Architect & Creative Technologist">
    <link rel="icon" type="image/jpeg" href="/logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/master.css">
</head>
<body style="margin:0; padding:0;">
    <div class="app-container">
        <nav class="app-nav">
            <div class="nav-logo">
                E:://
            </div>
            <div class="nav-scroll-group">
                <a href="/index.html" class="nav-item active">
                    <i class="fas fa-house"></i>
                    <span>Home</span>
                </a>
                <a href="/profile.html" class="nav-item">
                    <i class="fas fa-user-astronaut"></i>
                    <span>Profile</span>
                </a>
                <a href="/resume.html" class="nav-item">
                    <i class="fas fa-file-pdf"></i>
                    <span>Resume</span>
                </a>
                <a href="/connect.html" class="nav-item">
                    <i class="fas fa-plug"></i>
                    <span>Connect</span>
                </a>
            </div>
            <div class="nav-footer">
                <a href="https://github.com/jvhn0gl3" target="_blank" class="nav-item" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
            </div>
        </nav>

        <main class="app-main">
            <div class="app-status-bar">
                <div class="status-left">10:42 PM</div>
                <div class="status-right">
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-signal"></i>
                    <div class="battery"></div>
                </div>
            </div>

            <nav class="breadcrumb-nav">
                <div class="breadcrumb-content">
                    <span class="breadcrumb-item active">HOME</span>
                </div>
            </nav>

            <div class="main-content">
                <section class="hero">
                    <div class="hero-content">
                        <div class="hero-hud">
                            <h1 class="hero-title glitch" data-text="JOHN OGLETREE">JOHN OGLETREE</h1>
                            <div class="text-neon">DIGITAL ARCHITECT // CREATIVE TECHNOLOGIST</div>
                            
                            <div style="display:flex; gap:12px; flex-direction:column; margin-top: 20px;">
                                <a href="#projects" class="matrix-btn">$ ./view_projects</a>
                                <a href="#connect" class="matrix-btn">$ ./view_connect</a>
                            </div>
                        </div>
                    </div>
                </section>
                
                <div class="container" id="app">
                    <!-- ABOUT SECTION -->
                    <section id="about">
                        <h2>about.user</h2>
                        <div class="terminal-card">
                            <div class="card-header"><span class="card-title">Identity</span></div>
                            <div id="bio-data"></div>
                        </div>
                        <div class="terminal-card">
                            <div class="card-header"><span class="card-title">Capabilities</span></div>
                            <div class="desc-with-logo">
                                <p id="neural-network-desc"></p>
                            </div>
                            <div class="skills-grid" id="neural-skills-grid"></div>
                        </div>
                        
                        <div style="margin-top: 30px; text-align: center;">
                            <a href="/profile.html" class="matrix-btn" id="view-profile-btn">$ ./view_full_profile</a>
                        </div>
                    </section>
                    <hr class="cyber-hr">
                </div>
            </div>

            <header class="app-header">
                <div class="app-title">ECHO://OS</div>
            </header>
            
            <div class="crt"></div><div class="scanner"></div>
        </main>
    </div>
    <script src="/js/master.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('[SYSTEM] Service Worker Registered:', reg.scope))
                    .catch(err => console.error('[ERROR] Service Worker Registration Failed:', err));
            });
        }
    </script>
</body>
</html>
