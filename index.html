<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Echo - Digital Creator Portfolio" />
    <title>Echo | Digital Creator</title>
    <link rel="icon" type="image/jpeg" href="logo.jpeg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0A0A; color: #FFFFFF; line-height: 1.5; }
        .sidebar { position: fixed; left: 0; top: 0; width: 72px; height: 100vh; background: #111111; border-right: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .sidebar-inner { display: flex; flex-direction: column; align-items: center; height: 100%; padding: 24px 0; }
        .logo { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #6366F1, #8B5CF6); overflow: hidden; margin-bottom: 32px; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        nav { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .nav-link { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; color: #888; transition: all 0.15s ease; cursor: pointer; text-decoration: none; font-size: 20px; background: none; border: none; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: #FFF; }
        .nav-link.active { background: rgba(99,102,241,0.15); color: #6366F1; }
        .bottom-actions { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
        .main { margin-left: 72px; width: calc(100% - 72px); }
        section { padding: 80px 48px; width: 100%; }
        .hero { min-height: 100vh; display: flex; align-items: center; background: linear-gradient(135deg, #0A0A0A 0%, #0F0F0F 100%); }
        .hero-content { max-width: 900px; width: 100%; }
        .badge { display: inline-block; padding: 4px 12px; background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2); border-radius: 50px; font-size: 12px; color: #6366F1; margin-bottom: 24px; }
        h1 { font-size: 80px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 24px; }
        .hero p { font-size: 20px; color: #888; max-width: 600px; margin-bottom: 32px; }
        .buttons { display: flex; gap: 16px; margin-bottom: 64px; flex-wrap: wrap; }
        .btn-primary { padding: 12px 28px; background: linear-gradient(135deg, #6366F1, #8B5CF6); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; transition: transform 0.1s ease, opacity 0.1s ease; text-decoration: none; display: inline-block; }
        .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-secondary { padding: 12px 28px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-weight: 600; cursor: pointer; transition: all 0.1s ease; text-decoration: none; display: inline-block; }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }
        .stats { display: flex; gap: 48px; }
        .stats div span { display: block; font-size: 32px; font-weight: 700; color: #6366F1; }
        .stats div { font-size: 14px; color: #666; }
        .about { background: #0D0D0D; }
        .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; width: 100%; }
        .about-image { border-radius: 24px; overflow: hidden; background: linear-gradient(135deg, #6366F1, #8B5CF6); padding: 4px; }
        .about-image img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; }
        .about-content h3 { font-size: 32px; margin-bottom: 20px; }
        .about-content h3 span { color: #6366F1; font-size: 20px; }
        .about-content p { color: #888; margin-bottom: 20px; line-height: 1.6; }
        .stats-mini { display: flex; gap: 24px; margin: 24px 0; }
        .stats-mini div span { display: block; font-size: 24px; font-weight: 700; color: #6366F1; }
        .stats-mini div { font-size: 12px; color: #666; }
        .social { display: flex; gap: 12px; }
        .social a { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 10px; color: #888; transition: all 0.1s ease; text-decoration: none; }
        .social a:hover { background: rgba(99,102,241,0.2); color: #6366F1; }
        .section-header { text-align: center; margin-bottom: 60px; }
        h2 { font-size: 48px; font-weight: 700; margin-bottom: 16px; }
        .section-subtitle { color: #666; font-size: 18px; }
        .gradient { background: linear-gradient(135deg, #6366F1, #8B5CF6); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .services-grid, .projects-grid, .blog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; width: 100%; }
        .service-card, .project-card, .blog-card { background: #111111; border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 32px; transition: all 0.15s ease; }
        .service-card:hover, .project-card:hover, .blog-card:hover { transform: translateY(-4px); border-color: rgba(99,102,241,0.3); }
        .service-card i, .project-icon { font-size: 36px; color: #6366F1; margin-bottom: 24px; }
        .service-card h3, .project-card h3, .blog-card h3 { font-size: 22px; font-weight: 600; margin-bottom: 12px; }
        .service-card p, .project-card p, .blog-card p { color: #888; font-size: 15px; line-height: 1.6; }
        .project-icon { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; background: rgba(99,102,241,0.1); border-radius: 16px; margin-bottom: 24px; }
        .tags { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
        .tags span { font-size: 12px; padding: 4px 12px; background: rgba(255,255,255,0.05); border-radius: 50px; color: #888; }
        .blog-cat { font-size: 12px; color: #6366F1; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .blog-card a { display: inline-block; margin-top: 20px; color: #6366F1; text-decoration: none; font-size: 14px; font-weight: 500; }
        .view-all { background: transparent; border: 1px solid rgba(255,255,255,0.1); padding: 14px 32px; border-radius: 12px; color: white; font-weight: 500; cursor: pointer; transition: all 0.1s ease; font-size: 16px; }
        .view-all:hover { background: rgba(255,255,255,0.05); border-color: #6366F1; }
        .text-center { text-align: center; margin-top: 50px; }
        .connect { text-align: center; background: linear-gradient(135deg, #0A0A0A 0%, #0F0F0F 100%); padding: 100px 48px; width: 100%; }
        .connect p { color: #888; margin-bottom: 40px; font-size: 18px; }
        .connect-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        footer { padding: 32px 48px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); color: #666; font-size: 14px; width: 100%; }
        footer i { color: #6366F1; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal.hidden { display: none; }
        .modal-content { background: #111111; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; width: 90%; max-width: 500px; overflow: hidden; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 12px; }
        .modal-header input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; }
        .key-hint { font-size: 11px; padding: 4px 8px; background: rgba(255,255,255,0.05); border-radius: 6px; color: #666; }
        .modal-body { padding: 8px; }
        .command-group { font-size: 11px; text-transform: uppercase; color: #666; padding: 8px 12px; }
        .command-item { padding: 12px; border-radius: 10px; cursor: pointer; transition: background 0.1s ease; }
        .command-item:hover { background: rgba(255,255,255,0.05); }
        .access-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .access-item button { padding: 6px 16px; background: rgba(255,255,255,0.05); border: none; border-radius: 20px; color: white; cursor: pointer; }
        .access-item button.active { background: #6366F1; }
        .modal-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 12px; }
        .modal-footer button { flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer; }
        .modal-footer button:first-child { background: rgba(239,68,68,0.2); color: #EF4444; }
        .modal-footer button:last-child { background: rgba(99,102,241,0.2); color: #6366F1; }
        .close-btn { background: transparent; border: none; font-size: 24px; cursor: pointer; color: #888; }
        body.high-contrast { filter: contrast(150%); }
        body.large-text { font-size: 120%; }
        body.reduce-motion * { transition: none !important; animation: none !important; }
        body.dyslexic-font { font-family: 'OpenDyslexic', 'Comic Sans MS', sans-serif; }
        @media (max-width: 1024px) { section { padding: 60px 32px; } h1 { font-size: 56px; } h2 { font-size: 36px; } .services-grid, .projects-grid, .blog-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .sidebar { width: 60px; } .main { margin-left: 60px; width: calc(100% - 60px); } section { padding: 50px 24px; } h1 { font-size: 40px; } h2 { font-size: 28px; } .about-grid { grid-template-columns: 1fr; } .services-grid, .projects-grid, .blog-grid { grid-template-columns: 1fr; } }
        @media (max-width: 480px) { .sidebar { width: 56px; } .main { margin-left: 56px; width: calc(100% - 56px); } section { padding: 40px 16px; } h1 { font-size: 32px; } .buttons { flex-direction: column; } .btn-primary, .btn-secondary { text-align: center; width: 100%; } }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        (function() {
            'use strict';
            
            // Page Components
            const pages = {
                home: () => `
                    <section id="home" class="hero">
                        <div class="hero-content">
                            <div class="badge">Available for work</div>
                            <h1>Digital <span class="gradient">Alchemy</span></h1>
                            <p>Crafting digital experiences that transcend the ordinary. Full-stack development meets creative innovation.</p>
                            <div class="buttons">
                                <button class="btn-primary explore-btn">Explore Work</button>
                                <button class="btn-secondary contact-btn">Contact Me</button>
                            </div>
                            <div class="stats">
                                <div><span>10+</span> Years</div>
                                <div><span>50+</span> Projects</div>
                                <div><span>30+</span> Clients</div>
                            </div>
                        </div>
                    </section>
                `,
                about: () => `
                    <section id="about" class="about">
                        <div class="section-header">
                            <h2>About <span class="gradient">Me</span></h2>
                            <p class="section-subtitle">Get to know the person behind the code</p>
                        </div>
                        <div class="about-grid">
                            <div class="about-image"><img src="logo.jpeg" alt="Profile"></div>
                            <div class="about-content">
                                <h3>John Ogletree <span>@jvhn0gl3</span></h3>
                                <p>Full-Stack Digital Architect with over a decade of experience in software engineering and UI/UX design. I specialize in building high-performance, aesthetically pleasing digital products.</p>
                                <p>I bridge the gap between complex backend logic and intuitive frontend experiences, ensuring every line of code serves a purpose and every pixel has meaning.</p>
                                <div class="stats-mini">
                                    <div><span>10+</span> Years Exp</div>
                                    <div><span>50+</span> Projects</div>
                                </div>
                                <div class="social">
                                    <a href="#"><i class="fa-brands fa-github"></i></a>
                                    <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                                    <a href="#"><i class="fa-brands fa-twitter"></i></a>
                                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                                </div>
                            </div>
                        </div>
                    </section>
                `,
                services: () => `
                    <section id="services" class="services">
                        <div class="section-header">
                            <h2>What I <span class="gradient">Offer</span></h2>
                            <p class="section-subtitle">Comprehensive digital solutions for modern businesses</p>
                        </div>
                        <div class="services-grid">
                            <div class="service-card">
                                <i class="fa-solid fa-code"></i>
                                <h3>Web Development</h3>
                                <p>Modern, responsive websites built with cutting-edge technologies and best practices for optimal performance.</p>
                            </div>
                            <div class="service-card">
                                <i class="fa-solid fa-palette"></i>
                                <h3>UI/UX Design</h3>
                                <p>Beautiful, intuitive interfaces that users love to interact with, backed by user research and testing.</p>
                            </div>
                            <div class="service-card">
                                <i class="fa-solid fa-mobile-alt"></i>
                                <h3>Mobile Apps</h3>
                                <p>Cross-platform mobile applications for iOS and Android built with React Native and Flutter.</p>
                            </div>
                        </div>
                        <div class="text-center"><button class="view-all view-all-services">View All Services →</button></div>
                    </section>
                `,
                projects: () => `
                    <section id="projects" class="projects">
                        <div class="section-header">
                            <h2>Featured <span class="gradient">Projects</span></h2>
                            <p class="section-subtitle">Some of my best work</p>
                        </div>
                        <div class="projects-grid">
                            <div class="project-card">
                                <div class="project-icon"><i class="fa-solid fa-cube"></i></div>
                                <h3>Project Alpha</h3>
                                <p>A revolutionary platform for digital creators to showcase and sell their work.</p>
                                <div class="tags"><span>React</span><span>Node.js</span><span>MongoDB</span></div>
                            </div>
                            <div class="project-card">
                                <div class="project-icon"><i class="fa-solid fa-cloud"></i></div>
                                <h3>Project Beta</h3>
                                <p>Cloud-based analytics dashboard for real-time business intelligence.</p>
                                <div class="tags"><span>Vue</span><span>Python</span><span>AWS</span></div>
                            </div>
                            <div class="project-card">
                                <div class="project-icon"><i class="fa-solid fa-robot"></i></div>
                                <h3>Project Gamma</h3>
                                <p>AI-powered content generation tool for marketing teams.</p>
                                <div class="tags"><span>Next.js</span><span>OpenAI</span><span>PostgreSQL</span></div>
                            </div>
                        </div>
                        <div class="text-center"><button class="view-all view-all-projects">View All Projects →</button></div>
                    </section>
                `,
                blog: () => `
                    <section id="blog" class="blog">
                        <div class="section-header">
                            <h2>Latest <span class="gradient">Insights</span></h2>
                            <p class="section-subtitle">Thoughts on technology, design, and creativity</p>
                        </div>
                        <div class="blog-grid">
                            <div class="blog-card">
                                <div class="blog-cat">Technology</div>
                                <h3>The Future of Web Development</h3>
                                <p>Exploring emerging trends and technologies shaping the future of the web in 2024 and beyond.</p>
                                <a href="#">Read more →</a>
                            </div>
                            <div class="blog-card">
                                <div class="blog-cat">Design</div>
                                <h3>Minimalist UI Principles</h3>
                                <p>How less becomes more in modern interface design, and why simplicity wins.</p>
                                <a href="#">Read more →</a>
                            </div>
                            <div class="blog-card">
                                <div class="blog-cat">Career</div>
                                <h3>10 Years in Review</h3>
                                <p>Lessons learned from a decade of digital creation and software development.</p>
                                <a href="#">Read more →</a>
                            </div>
                        </div>
                        <div class="text-center"><button class="view-all view-all-blog">View All Posts →</button></div>
                    </section>
                `,
                connect: () => `
                    <section id="connect" class="connect">
                        <h2>Let's Work <span class="gradient">Together</span></h2>
                        <p>Have a project in mind? Let's create something amazing together.</p>
                        <div class="connect-buttons">
                            <a href="mailto:hello@echo.dev" class="btn-primary">Email Me</a>
                            <a href="#" class="btn-secondary">Discord</a>
                        </div>
                    </section>
                `
            };
            
            let currentPage = 'home';
            
            // Layout wrapper
            function renderLayout(pageContent) {
                return `
                    <aside class="sidebar">
                        <div class="sidebar-inner">
                            <div class="logo"><img src="logo.jpeg" alt="Echo"></div>
                            <nav>
                                <a href="#" data-page="home" class="nav-link ${currentPage === 'home' ? 'active' : ''}" title="Home"><i class="fa-solid fa-compass"></i></a>
                                <a href="#" data-page="about" class="nav-link ${currentPage === 'about' ? 'active' : ''}" title="About"><i class="fa-solid fa-user"></i></a>
                                <a href="#" data-page="services" class="nav-link ${currentPage === 'services' ? 'active' : ''}" title="Services"><i class="fa-solid fa-cube"></i></a>
                                <a href="#" data-page="projects" class="nav-link ${currentPage === 'projects' ? 'active' : ''}" title="Projects"><i class="fa-solid fa-layer-group"></i></a>
                                <a href="#" data-page="blog" class="nav-link ${currentPage === 'blog' ? 'active' : ''}" title="Blog"><i class="fa-solid fa-pen-fancy"></i></a>
                                <a href="#" data-page="connect" class="nav-link ${currentPage === 'connect' ? 'active' : ''}" title="Connect"><i class="fa-solid fa-paper-plane"></i></a>
                            </nav>
                            <div class="bottom-actions">
                                <button id="accessibility-trigger" class="nav-link" title="Accessibility"><i class="fa-solid fa-universal-access"></i></button>
                                <a href="https://github.com/jvhn0gl3" target="_blank" class="nav-link" title="GitHub"><i class="fa-brands fa-github"></i></a>
                            </div>
                        </div>
                    </aside>
                    <main class="main">
                        ${pageContent}
                        <footer>
                            <p>&copy; 2024 Echo. Built with <i class="fa-solid fa-heart"></i> by jvhn0gl3</p>
                        </footer>
                    </main>
                    <div id="command-palette" class="modal hidden">
                        <div class="modal-content">
                            <div class="modal-header">
                                <i class="fa-solid fa-terminal"></i>
                                <input type="text" id="command-input" placeholder="Type a command...">
                                <span class="key-hint">ESC</span>
                            </div>
                            <div class="modal-body">
                                <div class="command-group">Quick Actions</div>
                                <div class="command-item" data-page="home">🏠 Go to Home</div>
                                <div class="command-item" data-page="projects">📁 View Projects</div>
                                <div class="command-item" id="cmd-accessibility">♿ Accessibility</div>
                            </div>
                        </div>
                    </div>
                    <div id="accessibility-modal" class="modal hidden">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h3><i class="fa-solid fa-universal-access"></i> Accessibility</h3>
                                <button class="close-btn" id="close-modal-btn">&times;</button>
                            </div>
                            <div class="modal-body">
                                <div class="access-item"><span>🔆 High Contrast</span><button id="btn-high-contrast">Toggle</button></div>
                                <div class="access-item"><span>🔤 Larger Text</span><button id="btn-large-text">Toggle</button></div>
                                <div class="access-item"><span>📖 Dyslexic Font</span><button id="btn-dyslexic-font">Toggle</button></div>
                                <div class="access-item"><span>🎬 Reduce Motion</span><button id="btn-reduce-motion">Toggle</button></div>
                            </div>
                            <div class="modal-footer">
                                <button id="reset-all-btn">Reset All</button>
                                <button id="modal-close-btn">Close</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            function renderPage(pageName) {
                currentPage = pageName;
                const pageContent = pages[pageName] ? pages[pageName]() : pages.home();
                const fullHTML = renderLayout(pageContent);
                document.getElementById('app').innerHTML = fullHTML;
                attachEventListeners();
                updateActiveNav();
            }
            
            function updateActiveNav() {
                document.querySelectorAll('.nav-link[data-page]').forEach(link => {
                    const page = link.getAttribute('data-page');
                    if (page === currentPage) {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                });
            }
            
            function attachEventListeners() {
                // Navigation
                document.querySelectorAll('.nav-link[data-page]').forEach(link => {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const page = link.getAttribute('data-page');
                        renderPage(page);
                    });
                });
                
                // Command palette items
                document.querySelectorAll('.command-item[data-page]').forEach(item => {
                    item.addEventListener('click', () => {
                        const page = item.getAttribute('data-page');
                        renderPage(page);
                        closeCommandPalette();
                    });
                });
                
                // Hero buttons
                document.querySelector('.explore-btn')?.addEventListener('click', () => renderPage('projects'));
                document.querySelector('.contact-btn')?.addEventListener('click', () => renderPage('connect'));
                
                // View All buttons
                document.querySelectorAll('.view-all-services, .view-all-projects, .view-all-blog').forEach(btn => {
                    btn.addEventListener('click', () => alert('Coming soon!'));
                });
                
                // Accessibility
                document.getElementById('accessibility-trigger')?.addEventListener('click', openAccessibilityModal);
                document.getElementById('close-modal-btn')?.addEventListener('click', closeAccessibilityModal);
                document.getElementById('modal-close-btn')?.addEventListener('click', closeAccessibilityModal);
                document.getElementById('reset-all-btn')?.addEventListener('click', resetAllAccessibility);
                document.getElementById('btn-high-contrast')?.addEventListener('click', toggleHighContrast);
                document.getElementById('btn-large-text')?.addEventListener('click', toggleLargeText);
                document.getElementById('btn-dyslexic-font')?.addEventListener('click', toggleDyslexicFont);
                document.getElementById('btn-reduce-motion')?.addEventListener('click', toggleReduceMotion);
            }
            
            // Modal functions
            function getCommandPalette() { return document.getElementById('command-palette'); }
            function getAccessibilityModal() { return document.getElementById('accessibility-modal'); }
            function getCommandInput() { return document.getElementById('command-input'); }
            
            window.openCommandPalette = () => {
                const cp = getCommandPalette();
                if (cp) {
                    cp.classList.remove('hidden');
                    getCommandInput()?.focus();
                    document.body.style.overflow = 'hidden';
                }
            };
            
            window.closeCommandPalette = () => {
                const cp = getCommandPalette();
                if (cp) {
                    cp.classList.add('hidden');
                    document.body.style.overflow = '';
                }
            };
            
            window.openAccessibilityModal = () => {
                const am = getAccessibilityModal();
                if (am) {
                    am.classList.remove('hidden');
                    document.body.style.overflow = 'hidden';
                    updateButtonStates();
                }
            };
            
            window.closeAccessibilityModal = () => {
                const am = getAccessibilityModal();
                if (am) {
                    am.classList.add('hidden');
                    document.body.style.overflow = '';
                }
            };
            
            function updateButtonStates() {
                const btns = [
                    { id: 'btn-high-contrast', active: document.body.classList.contains('high-contrast') },
                    { id: 'btn-large-text', active: document.body.classList.contains('large-text') },
                    { id: 'btn-dyslexic-font', active: document.body.classList.contains('dyslexic-font') },
                    { id: 'btn-reduce-motion', active: document.body.classList.contains('reduce-motion') }
                ];
                btns.forEach(({ id, active }) => {
                    const btn = document.getElementById(id);
                    if (btn) btn.classList.toggle('active', active);
                });
            }
            
            window.toggleHighContrast = () => {
                document.body.classList.toggle('high-contrast');
                localStorage.setItem('highContrast', document.body.classList.contains('high-contrast'));
                updateButtonStates();
            };
            
            window.toggleLargeText = () => {
                document.body.classList.toggle('large-text');
                localStorage.setItem('largeText', document.body.classList.contains('large-text'));
                updateButtonStates();
            };
            
            window.toggleDyslexicFont = () => {
                document.body.classList.toggle('dyslexic-font');
                localStorage.setItem('dyslexicFont', document.body.classList.contains('dyslexic-font'));
                updateButtonStates();
            };
            
            window.toggleReduceMotion = () => {
                document.body.classList.toggle('reduce-motion');
                localStorage.setItem('reduceMotion', document.body.classList.contains('reduce-motion'));
                updateButtonStates();
            };
            
            window.resetAllAccessibility = () => {
                document.body.classList.remove('high-contrast', 'large-text', 'dyslexic-font', 'reduce-motion');
                ['highContrast', 'largeText', 'dyslexicFont', 'reduceMotion'].forEach(k => localStorage.removeItem(k));
                updateButtonStates();
                closeAccessibilityModal();
            };
            
            function loadAccessibilityPreferences() {
                if (localStorage.getItem('highContrast') === 'true') document.body.classList.add('high-contrast');
                if (localStorage.getItem('largeText') === 'true') document.body.classList.add('large-text');
                if (localStorage.getItem('dyslexicFont') === 'true') document.body.classList.add('dyslexic-font');
                if (localStorage.getItem('reduceMotion') === 'true') document.body.classList.add('reduce-motion');
                updateButtonStates();
            }
            
            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && !['INPUT', 'TEXTAREA'].includes(document.activeElement?.tagName)) {
                    e.preventDefault();
                    openCommandPalette();
                }
                if (e.key === 'Escape') {
                    closeAccessibilityModal();
                    closeCommandPalette();
                    document.body.style.overflow = '';
                }
            });
            
            // Close modals on outside click
            document.addEventListener('click', (e) => {
                const cp = getCommandPalette();
                const am = getAccessibilityModal();
                if (cp && e.target === cp) closeCommandPalette();
                if (am && e.target === am) closeAccessibilityModal();
            });
            
            // Security
            document.addEventListener('contextmenu', (e) => e.preventDefault());
            document.addEventListener('dragstart', (e) => e.preventDefault());
            
            // Initialize
            loadAccessibilityPreferences();
            renderPage('home');
            
            // Disable console
            const noop = () => {};
            console.log = console.info = console.warn = console.debug = console.table = console.trace = noop;
        })();
    </script>
</body>
</html>
