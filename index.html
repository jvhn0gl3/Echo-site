        input, textarea {

    <script>
        'use strict';
        
        // Helper functions
        function sanitizeText(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.textContent;
        }
        
        function isValidUrl(url) {
            if (!url) return false;
            const allowed = ['change.org', 'github.com'];
            try {
                const u = new URL(url);
                if (u.protocol !== 'https:') return false;
                return allowed.some(d => u.hostname === d || u.hostname.endsWith('.' + d));
            } catch { return false; }
        }
        
        // Sidebar toggle
        window.toggleSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar) {
                sidebar.classList.toggle('open');
                document.body.style.overflow = sidebar.classList.contains('open') && window.innerWidth <= 768 ? 'hidden' : '';
            }
        };
        
        // Close on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('sidebar')?.classList.remove('open');
                document.body.style.overflow = '';
            }
        });
        
        // Close on outside click
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768) {
                const sidebar = document.getElementById('sidebar');
                const toggle = document.querySelector('.menu-toggle');
                if (sidebar?.classList.contains('open') && !sidebar.contains(e.target) && !toggle?.contains(e.target)) {
                    sidebar.classList.remove('open');
                    document.body.style.overflow = '';
                }
            }
        });
        
        // Navigation
        document.querySelectorAll('#sidebar a, header a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const href = link.getAttribute('href');
                if (href?.startsWith('http') && isValidUrl(href)) {
                    window.open(href, '_blank', 'noopener,noreferrer');
                }
                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar')?.classList.remove('open');
                    document.body.style.overflow = '';
                }
            });
        });
        
        // Notifications
        const notifications = [
            { text: "days until Android OS lockdown - Sign the petition", link: "https://www.change.org/p/stop-google-from-limiting-apk-file-usage", color: "alert-safe", hasCountdown: true },
            { text: "New portfolio feature: Interactive 3D models coming soon!", link: null, color: "alert-warning", hasCountdown: false },
            { text: "New blog post: 'The Future of Web Design' - Read now!", link: null, color: "alert-info", hasCountdown: false },
            { text: "Fresh projects added to the Creations Gallery!", link: null, color: "alert-safe", hasCountdown: false },
            { text: "Subscribe to my newsletter for exclusive design resources!", link: null, color: "alert-safe", hasCountdown: false }
        ];
        
        let notificationIndex = 0;
        let interval = null;
        
        function getDaysRemaining() {
            const target = new Date('2026-09-01T00:00:00Z');
            const now = new Date();
            const diff = target.getTime() - now.getTime();
            return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
        }
        
        function getColorClass(days) {
            if (days > 60) return 'alert-safe';
            if (days > 30) return 'alert-warning';
            if (days > 7) return 'alert-danger';
            return 'alert-critical';
        }
        
        function updateNotification() {
            const bar = document.getElementById('notification-bar');
            const textEl = document.getElementById('notification-text');
            const iconEl = document.getElementById('notification-icon');
            if (!bar || !textEl) return;
            
            const n = notifications[notificationIndex];
            
            if (n.hasCountdown) {
                const days = getDaysRemaining();
                textEl.textContent = `⚠️ ${days} ${n.text}`;
                const color = getColorClass(days);
                bar.className = bar.className.split(' ').filter(c => !c.startsWith('alert-')).join(' ') + ' ' + color;
                iconEl.className = days <= 7 ? 'fa-solid fa-circle-exclamation text-sm animate-pulse' : 'fa-solid fa-bell text-sm';
            } else {
                textEl.textContent = `⚠️ ${n.text}`;
                bar.className = bar.className.split(' ').filter(c => !c.startsWith('alert-')).join(' ') + ' ' + n.color;
                iconEl.className = 'fa-solid fa-bell text-sm';
            }
            
            if (n.link && isValidUrl(n.link)) {
                bar.style.cursor = 'pointer';
                bar.onclick = () => window.open(n.link, '_blank', 'noopener,noreferrer');
            } else {
                bar.style.cursor = 'default';
                bar.onclick = null;
            }
            
            notificationIndex = (notificationIndex + 1) % notifications.length;
        }
        
        // Security: prevent copy but preserve styling
        document.addEventListener('copy', (e) => e.preventDefault());
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('dragstart', (e) => e.preventDefault());
        
        // Clear storage
        try { localStorage.clear(); sessionStorage.clear(); } catch(e) {}
        
        // Disable console
        const noop = () => {};
        console.log = console.info = console.warn = console.debug = console.table = console.trace = noop;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateNotification();
            interval = setInterval(updateNotification, 8000);
        });
    </script>
