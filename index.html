<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" id="metaDescription" />
    <meta name="author" content="" id="metaAuthor" />
    <title id="pageTitle">V3 | Digital Architect</title>
    <link rel="icon" type="image/png" href="https://cdn.john-ogletree.me/images/branding/logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/major-mono-display@5.2.8/index.min.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo" id="logoText">V3</a>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="#about">About</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#blog">Blog</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div id="dynamicContent">
            <!-- Content will be loaded dynamically -->
            <div style="text-align: center; padding: 3rem;">
                <i class="fas fa-spinner fa-pulse" style="font-size: 2rem; color: #3b82f6;"></i>
                <p style="margin-top: 1rem;">Loading content...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p id="footerText">© 2024 V3 — Built with <i class="fas fa-heart" style="color: #3b82f6;"></i></p>
    </footer>

    <button class="accessibility-btn" id="accessibilityBtn">
        <i class="fas fa-universal-access"></i>
    </button>

    <!-- Accessibility Modal -->
    <div id="accessibilityModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-universal-access"></i> <span id="modalTitle">Accessibility</span></h3>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="accessibility-option">
                <span>🔆 <span id="highContrastLabel">High Contrast</span></span>
                <button id="highContrastBtn">Toggle</button>
            </div>
            <div class="accessibility-option">
                <span>🔤 <span id="largeTextLabel">Larger Text</span></span>
                <button id="largeTextBtn">Toggle</button>
            </div>
            <div class="accessibility-option">
                <span>📖 <span id="dyslexicFontLabel">Dyslexic Font</span></span>
                <button id="dyslexicFontBtn">Toggle</button>
            </div>
            <div class="accessibility-option">
                <span>🎬 <span id="reduceMotionLabel">Reduce Motion</span></span>
                <button id="reduceMotionBtn">Toggle</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
