<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            margin: 0;
            padding: 20px;
            background-color: #f4f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box; /* Include padding in element's total width and height */
        }
        h1 {
            color: #007aff; /* iOS blue */
            font-size: 2.2em;
            margin-bottom: 15px;
            text-align: center;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            text-align: center;
            max-width: 600px; /* Limit width for readability on larger screens, but still works well on mobile */
        }
        /* Basic responsiveness - though the above styles are already mobile-first */
        @media (min-width: 600px) {
            body {
                padding: 40px;
            }
            h1 {
                font-size: 3em;
            }
            p {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <h1>Welcome</h1>
    <p>This is your mobile-inspired application interface.</p>
</body>
</html>
