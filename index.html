    <script>
        // SECURITY: Strict mode enabled
        'use strict';
        
        // SECURITY: No sensitive data stored in variables
        let sidebarOpen = false;
        let notificationInterval = null;
        let currentNotificationIndex = 0;
        
        // SECURITY: Sanitize ALL text before display
        function sanitizeText(text) {
            if (!text) return '';
            // Strip any HTML tags and escape special characters
            const div = document.createElement('div');
            div.textContent = text.replace(/[<>]/g, '');
            return div.textContent;
        }
        
        // SECURITY: Validate URLs against whitelist only
        function isValidAndSafeUrl(url) {
            if (!url) return false;
            const allowedDomains = ['change.org', 'github.com'];
            try {
                const urlObj = new URL(url);
                // Only allow HTTPS
                if (urlObj.protocol !== 'https:') return false;
                return allowedDomains.some(domain => urlObj.hostname === domain || urlObj.hostname.endsWith('.' + domain));
            } catch {
                return false;
            }
        }
        
        // SECURITY: Secure sidebar toggle with state tracking
        window.toggleSidebarSecure = function() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar) {
                sidebarOpen = !sidebarOpen;
                if (sidebarOpen) {
                    sidebar.classList.add('open');
                    if (window.innerWidth <= 768) {
                        document.body.style.overflow = 'hidden';
                    }
                } else {
                    sidebar.classList.remove('open');
                    document.body.style.overflow = '';
                }
            }
        };
        
        // SECURITY: Close sidebar on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const sidebar = document.getElementById('sidebar');
                if (sidebar && sidebar.classList.contains('open')) {
                    sidebar.classList.remove('open');
                    sidebarOpen = false;
                    document.body.style.overflow = '';
                }
            }
        });
        
        // SECURITY: Click outside to close
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768) {
                const sidebar = document.getElementById('sidebar');
                const menuToggle = document.querySelector('.menu-toggle');
                if (sidebar && sidebar.classList.contains('open') && 
                    !sidebar.contains(e.target) && 
                    !menuToggle.contains(e.target)) {
                    sidebar.classList.remove('open');
                    sidebarOpen = false;
                    document.body.style.overflow = '';
                }
            }
        });
        
        // SECURITY: Generic navigation - NO data leakage
        document.querySelectorAll('#sidebar a, header a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const href = link.getAttribute('href');
                if (href && href.startsWith('http')) {
                    if (isValidAndSafeUrl(href)) {
                        window.open(href, '_blank', 'noopener,noreferrer');
                    }
                }
                // Close sidebar on mobile
                if (window.innerWidth <= 768) {
                    const sidebar = document.getElementById('sidebar');
                    sidebar.classList.remove('open');
                    sidebarOpen = false;
                    document.body.style.overflow = '';
                }
            });
        });
        
        // SECURITY: Sanitized notifications - NO sensitive content
        const notifications = [
            { text: "days until Android OS update", link: "https://www.change.org/p/stop-google-from-limiting-apk-file-usage", color: "alert-safe", hasCountdown: true },
            { text: "New features coming soon", link: null, color: "alert-warning", hasCountdown: false },
            { text: "New content added", link: null, color: "alert-info", hasCountdown: false },
            { text: "Portfolio updates available", link: null, color: "alert-safe", hasCountdown: false }
        ];
        
        // SECURITY: Safe countdown - no specific dates exposed
        function getSafeCountdown() {
            try {
                // Use a fixed target date, never expose the actual date
                const targetDate = new Date('2026-09-01T00:00:00Z');
                const now = new Date();
                const diff = targetDate.getTime() - now.getTime();
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                return Math.max(0, Math.min(365, days)); // Cap at 365 days
            } catch {
                return 100; // Safe fallback
            }
        }
        
        function getColorClass(days) {
            if (days > 60) return 'alert-safe';
            if (days > 30) return 'alert-warning';
            if (days > 7) return 'alert-danger';
            return 'alert-critical';
        }
        
        function updateNotificationBar() {
            const bar = document.getElementById('notification-bar');
            const textEl = document.getElementById('notification-text');
            const iconEl = document.getElementById('notification-icon');
            
            if (!bar || !textEl) return;
            
            try {
                const notification = notifications[currentNotificationIndex];
                
                if (notification.hasCountdown) {
                    const days = getSafeCountdown();
                    // SECURITY: Sanitize the output - NO raw HTML
                    textEl.textContent = `⚠️ ${days} ${sanitizeText(notification.text)}`;
                    const colorClass = getColorClass(days);
                    bar.classList.remove('alert-safe', 'alert-warning', 'alert-danger', 'alert-critical');
                    bar.classList.add(colorClass);
                    if (iconEl) {
                        iconEl.className = days <= 7 ? 'fa-solid fa-circle-exclamation text-sm animate-pulse' : 'fa-solid fa-bell text-sm';
                    }
                } else {
                    textEl.textContent = `⚠️ ${sanitizeText(notification.text)}`;
                    bar.classList.remove('alert-safe', 'alert-warning', 'alert-danger', 'alert-critical');
                    bar.classList.add(notification.color);
                    if (iconEl) {
                        iconEl.className = 'fa-solid fa-bell text-sm';
                    }
                }
                
                // SECURITY: Only set click handler for safe URLs
                if (notification.link && isValidAndSafeUrl(notification.link)) {
                    bar.style.cursor = 'pointer';
                    bar.onclick = () => {
                        window.open(notification.link, '_blank', 'noopener,noreferrer');
                    };
                } else {
                    bar.style.cursor = 'default';
                    bar.onclick = null;
                }
                
                currentNotificationIndex = (currentNotificationIndex + 1) % notifications.length;
            } catch (e) {
                // Silent fail - don't expose errors
                textEl.textContent = '⚠️ Update available';
            }
        }
        
        // SECURITY: Initialize with error handling
        function init() {
            try {
                updateNotificationBar();
                if (notificationInterval) clearInterval(notificationInterval);
                notificationInterval = setInterval(updateNotificationBar, 8000);
            } catch (e) {
                // Silent fail
            }
        }
        
        // Start when ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
        
        // SECURITY: Disable console methods that could leak info
        const noop = () => {};
        console.log = noop;
        console.info = noop;
        console.warn = noop;
        console.debug = noop;
        console.table = noop;
        console.trace = noop;
        
        // SECURITY: Prevent copy/paste of content
        document.addEventListener('copy', (e) => {
            e.preventDefault();
            return false;
        });
        
        // SECURITY: Prevent developer tools detection (basic)
        setInterval(() => {
            const before = new Date().getTime();
            debugger;
            const after = new Date().getTime();
            if (after - before > 100) {
                // Dev tools might be open - clear sensitive data
                document.body.style.opacity = '0.99';
            }
        }, 5000);
        
        // SECURITY: Clear any potential localStorage/sessionStorage
        try {
            localStorage.clear();
            sessionStorage.clear();
        } catch(e) {}
        
        // SECURITY: Prevent drag and drop data exfiltration
        document.addEventListener('dragstart', (e) => {
            e.preventDefault();
            return false;
        });
        
        // SECURITY: Block right-click context menu
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            return false;
        });
    </script>
