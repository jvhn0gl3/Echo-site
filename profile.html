    <style>
        .file-tree {
            margin-top: 20px;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 255, 157, 0.02);
            padding: 15px;
            border: 1px solid rgba(0, 255, 157, 0.1);
        }
        .tree-root {
            color: #ffd93d;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .tree-branch {
            position: relative;
            padding-left: 20px;
            border-left: 1px solid rgba(0, 255, 157, 0.3);
            margin-left: 10px;
            padding-bottom: 10px;
        }
        .tree-branch.last {
            border-left-color: transparent;
        }
        .tree-branch::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 15px;
            height: 10px;
            border-left: 1px solid rgba(0, 255, 157, 0.3);
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
        }
        .tree-branch.last::before {
            border-left: 1px solid rgba(0, 255, 157, 0.3);
        }
        .tree-node {
            color: #fff;
            font-size: 0.85rem;
        }
        
        .op-log-item {
            border-left: 2px solid #ff6b6b;
            padding-left: 15px;
            margin-bottom: 20px;
            background: rgba(255, 107, 107, 0.02);
            padding: 10px 15px;
        }
    </style>
</head>
