<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SERVICES // ECHO://TERMINAL | John Ogletree</title>
    <meta name="description" content="Professional services offered by John Ogletree - Digital Architecture & Creative Technology">
    <link rel="icon" type="image/jpeg" href="/logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <!-- Pre-Render Style Injection Engine -->
    <script>
        (function() {
            const width = window.innerWidth;
            let breakpoint = 'mobile';
            if (width >= 1024) breakpoint = 'desktop';
            else if (width >= 768) breakpoint = 'tablet';
            
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = `/css/layout-${breakpoint}.css`;
            document.head.appendChild(link);
            
            console.log(`[SYSTEM] Resolution-Aware Style Injected: ${breakpoint}_mode`);
        })();
    </script>
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/effects.css">
    <link rel="stylesheet" href="/css/hero.css">
    </head>
<body style="margin:0; padding:0;">

    <site-sidebar active="services"></site-sidebar>

    <div class="crt"></div><div class="scanner"></div>
    
    <div class="main-content">
        <section class="hero" style="min-height: 40vh; margin-bottom: 30px;">
            <div class="hero-grid"></div>
            <div class="hero-content">
                <div class="hero-hud">
                    <div class="hud-bracket bracket-tl"></div>
                    <div class="hud-bracket bracket-tr"></div>
                    <div class="hud-bracket bracket-bl"></div>
                    <div class="hud-bracket bracket-br"></div>
                    
                    <h1 class="hero-title glitch" data-text="SYSTEM:SERVICES">SYSTEM:SERVICES</h1>
                    <div class="text-neon" style="letter-spacing: 5px; font-weight: bold; margin: 10px 0;">
                        ARCHITECTURAL SOLUTIONS // TECHNICAL EXPERTISE
                    </div>
                </div>
            </div>
        </section>

        <div class="container" id="app">
            <section id="service-controls" style="margin-bottom: 40px;">
                <div class="terminal-card">
                    <div class="card-header"><i class="fas fa-search"></i><span class="card-title">Filter System Modules</span></div>
                    <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: center;">
                        <div style="flex: 1; min-width: 250px; position: relative;">
                            <span style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--neon-primary); font-family: monospace;">$ grep </span>
                            <input type="text" id="service-search" class="terminal-input" placeholder="search_modules..." style="padding-left: 65px; margin-bottom: 0;">
                        </div>
                        <div class="filter-group" style="display: flex; gap: 10px; flex-wrap: wrap;">
                            <button class="terminal-btn filter-btn active" data-category="all" style="width: auto; padding: 8px 20px;">[ALL]</button>
                            <button class="terminal-btn filter-btn" data-category="development" style="width: auto; padding: 8px 20px;">[DEV]</button>
                            <button class="terminal-btn filter-btn" data-category="design" style="width: auto; padding: 8px 20px;">[DSN]</button>
                            <button class="terminal-btn filter-btn" data-category="consulting" style="width: auto; padding: 8px 20px;">[CON]</button>
                            <button class="terminal-btn filter-btn" data-category="ai" style="width: auto; padding: 8px 20px;">[AI]</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="service-modules">
                <h2><i class="fas fa-cube"></i> [SYS] service_modules — operational</h2>
                <div class="grid-2" id="services-grid"></div>
            </section>

            <div class="section-divider"><div class="divider-line"></div><i class="fas fa-plug divider-icon"></i><div class="divider-line"></div></div>

            <section id="process" style="text-align: center;">
                <h2 style="display: inline-block;"><i class="fas fa-microchip"></i> [PROC] architectural_workflow</h2>
                <div class="terminal-card" style="max-width: 600px; margin: 20px auto;">
                    <div class="skills-grid" style="grid-template-columns: repeat(2, 1fr);" id="workflow-steps"></div>
                    <p style="margin-top: 15px; font-size: 0.8rem; color: var(--text-dim);">A rigorous, multi-stage pipeline designed to ensure maximum resonance and system integrity.</p>
                </div>
            </section>
        </div>
    </div>

    <script src="/js/sidebar-component.js"></script>
    <script src="/js/navigation.js"></script>
    <script src="/js/ui-effects.js"></script>
    <script src="/js/forms.js"></script>
    <script src="/js/data-loader.js"></script>
    <script src="/js/content-loader.js"></script>
</body>
</html>
